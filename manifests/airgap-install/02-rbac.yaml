# ate-controller ClusterRole (from generated/role.yaml)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ate-controller
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["ate.dev"]
  resources: ["actortemplates", "workerpools"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["ate.dev"]
  resources: ["actortemplates/finalizers", "workerpools/finalizers"]
  verbs: ["update"]
- apiGroups: ["ate.dev"]
  resources: ["actortemplates/status", "workerpools/status"]
  verbs: ["get", "patch", "update"]

