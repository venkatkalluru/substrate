# SandboxConfig for gVisor — SKIP THIS FILE if gVisor (runsc) is not enabled on
# your cluster nodes.  The substrate system components (ateapi, atelet, atenet,
# etc.) deploy and run fine without it; only actor workloads using
# sandboxClass: gvisor need this config applied.
#
# To apply (only when gVisor IS enabled on nodes):
#   1. Host the runsc binaries on your internal HTTP/S3 store.
#   2. Pass the URLs + sha256 hashes to render.sh via --gvisor-* flags.
#   3. kubectl apply -f manifests/airgap-install/rendered/04-sandboxconfig.yaml
#
# For prototyping with runc/regular containers: do NOT apply this file.
# WorkerPools that reference sandboxClass: gvisor will remain non-functional
# until gVisor is enabled and this SandboxConfig is applied.
apiVersion: ate.dev/v1alpha1
kind: SandboxConfig
metadata:
  name: gvisor-default
spec:
  sandboxClass: gvisor
  default: true
  assets:
    amd64:
      runsc:
        url: "REPLACE_GVISOR_AMD64_URL"
        sha256: "REPLACE_GVISOR_AMD64_SHA256"
    arm64:
      runsc:
        url: "REPLACE_GVISOR_ARM64_URL"
        sha256: "REPLACE_GVISOR_ARM64_SHA256"
