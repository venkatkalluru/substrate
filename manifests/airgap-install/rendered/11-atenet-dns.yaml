apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns
  namespace: acr-substrate
  labels:
    app: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns
  template:
    metadata:
      labels:
        app: dns
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: atenet-dns
      nodeSelector:
        kubernetes.io/os: linux
      shareProcessNamespace: true
      initContainers:
      - name: init-dns
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/busybox:1.36
        command: ["sh", "-c"]
        args:
        - |
          cat <<'EOF' > /etc/coredns/Corefile
          .:53 {
              errors
              health :8080
              ready :8181
              reload
          }
          EOF
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
      containers:
      - name: coredns
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/coredns:1.11.1
        imagePullPolicy: IfNotPresent
        args: ["-conf", "/etc/coredns/Corefile"]
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
        ports:
        - name: dns
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8181
            scheme: HTTP
          initialDelaySeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
      - name: dns-controller
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/substrate-atenet:v0.1.1
        args:
        - "dns"
        - "--log-level=debug"
        - "--interval=10s"
        - "--corefile-path=/etc/coredns/Corefile"
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
      volumes:
      - name: dns-config-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dns
  namespace: acr-substrate
  labels:
    app: dns
spec:
  selector:
    app: dns
  type: ClusterIP
  ports:
  - name: dns
    port: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    protocol: TCP
