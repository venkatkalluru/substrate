apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: actortemplates.ate.dev
spec:
  group: ate.dev
  names:
    kind: ActorTemplate
    listKind: ActorTemplateList
    plural: actortemplates
    shortNames:
    - actortemplate
    singular: actortemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sandboxClass
      name: Class
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ActorTemplate. This field
              is immutable.
            properties:
              containers:
                description: Containers is the workload definition.
                items:
                  properties:
                    command:
                      items:
                        type: string
                      maxItems: 64
                      type: array
                      x-kubernetes-list-type: atomic
                    env:
                      items:
                        properties:
                          name:
                            minLength: 1
                            pattern: ^[ -<>-~]+$
                            type: string
                          value:
                            minLength: 0
                            type: string
                          valueFrom:
                            maxProperties: 1
                            minProperties: 1
                            properties:
                              secretKeyRef:
                                properties:
                                  key:
                                    minLength: 1
                                    pattern: ^[-._a-zA-Z0-9]+$
                                    type: string
                                  name:
                                    maxLength: 253
                                    type: string
                                    x-kubernetes-validations:
                                    - message: Name must be a valid DNS subdomain
                                      rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                                  optional:
                                    type: boolean
                                required:
                                - key
                                - name
                                type: object
                            type: object
                        required:
                        - name
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of the fields in [value valueFrom]
                            must be set
                          rule: '[has(self.value),has(self.valueFrom)].filter(x,x==true).size()
                            == 1'
                      maxItems: 32
                      type: array
                    image:
                      type: string
                      x-kubernetes-validations:
                      - message: All images must be pinned (changing the image invalidates
                          snapshots)
                        rule: self.contains('@')
                    name:
                      maxLength: 63
                      type: string
                      x-kubernetes-validations:
                      - message: Name must be a valid DNS label
                        rule: '!format.dns1123Label().validate(self).hasValue()'
                    readyz:
                      properties:
                        httpGet:
                          properties:
                            path:
                              default: /readyz
                              maxLength: 1024
                              pattern: ^/([A-Za-z0-9\-._~!$&'()*+,;=:@/]|%[0-9A-Fa-f]{2})*$
                              type: string
                            port:
                              format: int32
                              maximum: 65535
                              minimum: 1
                              type: integer
                          required:
                          - port
                          type: object
                      required:
                      - httpGet
                      type: object
                    volumeMounts:
                      items:
                        properties:
                          mountPath:
                            maxLength: 4096
                            type: string
                            x-kubernetes-validations:
                            - message: 'MountPath must be a clean absolute Unix path'
                              rule: self.startsWith('/') && size(self) > 1 && !self.endsWith('/')
                                && !self.contains('//') && !self.contains(':') &&
                                !self.matches('[\x00-\x1f\x7f]') && !self.matches('(^|/)[.][.]?(/|$)')
                          name:
                            maxLength: 63
                            type: string
                            x-kubernetes-validations:
                            - message: Name must be a valid DNS label
                              rule: '!format.dns1123Label().validate(self).hasValue()'
                        required:
                        - mountPath
                        - name
                        type: object
                      maxItems: 32
                      type: array
                  required:
                  - image
                  - name
                  type: object
                maxItems: 10
                type: array
              pauseImage:
                type: string
                x-kubernetes-validations:
                - message: All images must be pinned (changing the image invalidates
                    snapshots)
                  rule: self.contains('@')
              sandboxClass:
                default: gvisor
                enum:
                - gvisor
                - microvm
                type: string
              snapshotsConfig:
                properties:
                  location:
                    minLength: 1
                    type: string
                  onCommit:
                    default: Full
                    enum:
                    - Full
                    - Data
                    type: string
                  onPause:
                    default: Full
                    enum:
                    - Full
                    - Data
                    type: string
                required:
                - location
                type: object
                x-kubernetes-validations:
                - message: onCommit must be a subset of onPause
                  rule: '(has(self.onPause) ? self.onPause : ''Full'') == ''Full''
                    || (has(self.onCommit) ? self.onCommit : ''Full'') == (has(self.onPause)
                    ? self.onPause : ''Full'')'
              volumes:
                items:
                  properties:
                    durableDir:
                      type: object
                    name:
                      maxLength: 63
                      type: string
                      x-kubernetes-validations:
                      - message: Name must be a valid DNS label
                        rule: '!format.dns1123Label().validate(self).hasValue()'
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of the fields in [durableDir] must be set
                    rule: '[has(self.durableDir)].filter(x,x==true).size() == 1'
                maxItems: 32
                type: array
              workerSelector:
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - pauseImage
            - snapshotsConfig
            type: object
            x-kubernetes-validations:
            - message: Spec is immutable
              rule: self == oldSelf
            - message: At most one DurableDir-typed volume is supported per ActorTemplate
              rule: '!has(self.volumes) || self.volumes.filter(v, has(v.durableDir)).size()
                <= 1'
            - message: A container may mount at most one DurableDir-typed volume
              rule: '!has(self.containers) || self.containers.all(c, !has(c.volumeMounts)
                || c.volumeMounts.filter(vm, has(self.volumes) && self.volumes.exists(v,
                v.name == vm.name && has(v.durableDir))).size() <= 1)'
            - message: DurableDir volumes are not supported when sandboxClass is 'microvm'
              rule: '!has(self.sandboxClass) || self.sandboxClass != ''microvm'' ||
                !has(self.volumes) || !self.volumes.exists(v, has(v.durableDir))'
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              goldenActorID:
                type: string
              goldenSnapshot:
                type: string
              phase:
                type: string
              takeGoldenSnapshotAt:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
