kind: Service
apiVersion: v1
metadata:
  name: ate-controller
  namespace: acr-substrate
  labels:
    app: ate-controller
spec:
  selector:
    app: ate-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ate-controller
  namespace: acr-substrate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ate-controller
  template:
    metadata:
      labels:
        app: ate-controller
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: ate-controller
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: ate-controller
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/substrate-atecontroller:v0.1.1
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
