apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-config
  namespace: acr-substrate
data:
  valkey.conf: |
    port 0
    tls-port 6379
    tls-cluster yes
    tls-replication yes
    tls-cert-file /run/servicedns.podcert.ate.dev/credential-bundle.pem
    tls-key-file /run/servicedns.podcert.ate.dev/credential-bundle.pem
    tls-ca-cert-file /etc/valkey-ca/ca.crt
    tls-auth-clients yes
    tls-auto-reload-interval 43200
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    appendonly yes
    protected-mode no
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster-service
  namespace: acr-substrate
spec:
  clusterIP: None
  selector:
    app: valkey-cluster
  ports:
  - name: valkey
    port: 6379
    targetPort: 6379
  - name: bus
    port: 16379
    targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster
  namespace: acr-substrate
spec:
  selector:
    app: valkey-cluster
  ports:
  - name: valkey
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-cluster
  namespace: acr-substrate
spec:
  serviceName: valkey-cluster-service
  replicas: 6
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: valkey-cluster
  template:
    metadata:
      labels:
        app: valkey-cluster
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: valkey
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/valkey:9.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          POD_DNS="${HOSTNAME}.valkey-cluster-service.acr-substrate.svc"
          cp /etc/valkey/valkey.conf /tmp/valkey.conf
          {
            echo "cluster-announce-hostname ${POD_DNS}"
            echo "cluster-announce-tls-port 6379"
            echo "cluster-announce-bus-port 16379"
            echo "cluster-preferred-endpoint-type hostname"
          } >> /tmp/valkey.conf
          exec valkey-server /tmp/valkey.conf
        ports:
        - name: valkey
          containerPort: 6379
        - name: bus
          containerPort: 16379
        volumeMounts:
        - name: config
          mountPath: /etc/valkey
        - name: servicedns
          mountPath: /run/servicedns.podcert.ate.dev
        - name: valkey-ca-certs
          mountPath: /etc/valkey-ca
          readOnly: true
        - name: data
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: valkey-config
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-init
  namespace: acr-substrate
spec:
  template:
    metadata:
      labels:
        app: valkey-cluster-init
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: OnFailure
      containers:
      - name: init
        image: docker-dev-artifactory.workday.com/venkatkalluru/substrate/valkey:9.1
        volumeMounts:
        - name: servicedns
          mountPath: /run/servicedns.podcert.ate.dev
        - name: valkey-ca-certs
          mountPath: /etc/valkey-ca
          readOnly: true
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for all Valkey pods to resolve..."
          for i in 0 1 2 3 4 5; do
            until getent hosts valkey-cluster-${i}.valkey-cluster-service.acr-substrate.svc >/dev/null 2>&1; do
              echo "Waiting for valkey-cluster-${i} DNS..."
              sleep 2
            done
          done

          VALKEY_NODES=""
          for i in 0 1 2 3 4 5; do
            VALKEY_NODES="${VALKEY_NODES} valkey-cluster-${i}.valkey-cluster-service.acr-substrate.svc:6379"
          done

          until valkey-cli --tls \
            --cacert /etc/valkey-ca/ca.crt \
            --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem \
            --key /run/servicedns.podcert.ate.dev/credential-bundle.pem \
            -h valkey-cluster-0.valkey-cluster-service.acr-substrate.svc ping >/dev/null 2>&1; do
            echo "Waiting for valkey-cluster-0..."
            sleep 2
          done

          INIT_STATUS=$(valkey-cli --tls \
            --cacert /etc/valkey-ca/ca.crt \
            --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem \
            --key /run/servicedns.podcert.ate.dev/credential-bundle.pem \
            -h valkey-cluster-0.valkey-cluster-service.acr-substrate.svc \
            cluster info 2>/dev/null | grep cluster_state || true)

          if [ -z "${INIT_STATUS}" ] || ! echo "${INIT_STATUS}" | grep -q "cluster_state:ok"; then
            valkey-cli --tls \
              --cacert /etc/valkey-ca/ca.crt \
              --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --key /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --cluster create ${VALKEY_NODES} \
              --cluster-replicas 1 \
              --cluster-yes
          fi
      volumes:
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - key: ca.crt
                path: ca.crt
