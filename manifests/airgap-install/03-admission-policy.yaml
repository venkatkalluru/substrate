apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: sandboxconfig-assets
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups:   ["ate.dev"]
      apiVersions: ["v1alpha1"]
      operations:  ["CREATE", "UPDATE"]
      resources:   ["sandboxconfigs"]
  validations:
  - expression: >-
      object.spec.sandboxClass != 'gvisor' ||
      (has(object.spec.assets) && size(object.spec.assets) > 0 &&
       object.spec.assets.all(arch, 'runsc' in object.spec.assets[arch]))
    message: "a gvisor SandboxConfig must define a 'runsc' asset for every architecture under spec.assets"
  - expression: >-
      object.spec.sandboxClass != 'microvm' ||
      (has(object.spec.assets) && size(object.spec.assets) > 0 &&
       object.spec.assets.all(arch,
         ['cloud-hypervisor', 'virtiofsd', 'kata-kernel', 'kata-image', 'kata-config']
           .all(name, name in object.spec.assets[arch])))
    message: "a microvm SandboxConfig must define cloud-hypervisor, virtiofsd, kata-kernel, kata-image, and kata-config assets for every architecture under spec.assets"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: sandboxconfig-assets
spec:
  policyName: sandboxconfig-assets
  validationActions: ["Deny"]
