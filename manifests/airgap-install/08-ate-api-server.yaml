apiVersion: apps/v1
kind: Deployment
metadata:
  name: ate-api-server-deployment
  namespace: ate-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ate-api-server
  template:
    metadata:
      labels:
        app: ate-api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: ate-api-server
      containers:
      - name: ate-api-server
        image: REPLACE_REGISTRY/substrate-ateapi:REPLACE_IMAGE_TAG
        args:
        - "--grpc-listen-addr=0.0.0.0:443"
        - "--grpc-server-cred-bundle=/run/servicedns.podcert.ate.dev/credential-bundle.pem"
        - --redis-cluster-address=@env
        - --redis-ca-certs=/etc/valkey-ca/ca.crt
        - --redis-use-iam-auth=@env
        - --redis-tls-server-name=@env
        - --redis-client-cert=@env
        - --client-jwt-issuer=@env
        - --client-jwt-audience=api.ate-system.svc
        - --session-id-jwt-pool=/run/session-id-jwt-pool/pool.json
        - --session-id-ca-pool=/run/session-id-ca-pool/pool.json
        - --workerpool-ca-certs=/run/workerpool-ca-certs/trust-bundle.pem
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.pod.uid=$(POD_UID),service.instance.id=$(POD_UID)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: REPLACE_OTEL_ENDPOINT
        envFrom:
        - configMapRef:
            name: ate-api-server-envvars
            optional: true
        volumeMounts:
        - name: servicedns
          mountPath: /run/servicedns.podcert.ate.dev
        - name: session-id-jwt-pool
          mountPath: /run/session-id-jwt-pool
        - name: valkey-ca-certs
          mountPath: /etc/valkey-ca
          readOnly: true
        - name: session-id-ca-pool
          mountPath: /run/session-id-ca-pool
          readOnly: true
        - name: workerpool-ca-certs
          mountPath: /run/workerpool-ca-certs
          readOnly: true
        ports:
        - containerPort: 443
        - name: prometheus
          containerPort: 9090
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 2
      volumes:
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: session-id-jwt-pool
        projected:
          sources:
          - secret:
              name: session-id-jwt-pool
              items:
              - key: pool
                path: pool.json
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - key: ca.crt
                path: ca.crt
      - name: session-id-ca-pool
        projected:
          sources:
          - secret:
              name: session-id-ca-pool
              items:
              - key: pool
                path: pool.json
      - name: workerpool-ca-certs
        projected:
          sources:
          - clusterTrustBundle:
              signerName: podidentity.podcert.ate.dev/identity
              labelSelector:
                matchLabels:
                  podcert.ate.dev/canarying: live
              path: trust-bundle.pem
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ate-system
spec:
  type: ClusterIP
  selector:
    app: ate-api-server
  ports:
  - name: grpc
    protocol: TCP
    port: 443
    targetPort: 443
