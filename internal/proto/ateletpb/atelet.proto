syntax = "proto3";

package atelet;

option go_package = "github.com/agent-substrate/substrate/internal/proto/ateletpb";

service AteomHerder {
  // Run tells atelet to create a new containerized workload from scratch on an
  // ateom.
  rpc Run(RunRequest) returns (RunResponse) {}

  // Checkpoint tells atelet to save the current state of the workload on an
  // ateom to object storage, and then completely the ateom to a blank state
  // (back to "available" state.)
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse) {}

  // Restore restores a workload from checkpoint onto an ateom.
  rpc Restore(RestoreRequest) returns (RestoreResponse) {}
}

message RunRequest {
  string target_ateom_uid = 1;

  string atespace = 2;
  string actor_id = 3;

  string actor_template_namespace = 4;
  string actor_template_name      = 5;

  WorkloadSpec spec = 6;

  // The sandbox binaries to use for booting this actor from scratch. atelet
  // fetches the relevant assets and records them with the actor's on-node state
  // so a later Checkpoint can pin the same version into the snapshot manifest.
  SandboxAssets sandbox_assets = 7;
}

// AssetFile is one content-addressed file atelet fetches for a sandbox runtime
// (e.g. the gVisor runsc binary).
message AssetFile {
  // gs:// URL to download the asset from.
  string url = 1;
  // Lower-case hex SHA256; names the cached file and verifies its integrity.
  string sha256 = 2;
}

// ArchAssets is the set of assets for a single architecture, keyed by asset
// name (a wrapper message because proto map values cannot themselves be maps).
message ArchAssets {
  map<string, AssetFile> files = 1; // asset name -> file
}

// SandboxAssets is the generic, backend-agnostic description of the sandbox
// binaries for an actor: a sandbox class plus assets keyed first by
// architecture (GOARCH) and then by asset name. atelet's backend code
// interprets the asset names (gVisor expects "runsc").
message SandboxAssets {
  string sandbox_class = 1;          // e.g. "gvisor"
  map<string, ArchAssets> assets = 2; // arch -> {name -> file}
}

// WorkloadSpec parallels Pod, but with far fewer configurable fields.
message WorkloadSpec {
  repeated Container containers  = 1;
  string             pause_image = 2;
  repeated Volume    volumes     = 3;
}

enum VolumeType {
  VOLUME_TYPE_UNSPECIFIED  = 0;
  VOLUME_TYPE_DURABLE_DIR  = 1;
}

message DurableDirVolume {
}

message Volume {
  string name = 1;

  VolumeType type = 2;

  oneof source{
    DurableDirVolume durable_dir = 3;
  }
}

message VolumeMount{
  string name = 1;
  string mount_path = 2;
}

message Container {
  string               name          = 1;
  string               image         = 2;
  repeated string      command       = 3;
  repeated EnvEntry    env           = 4;
  Readyz               readyz  = 5;
  repeated VolumeMount volume_mounts = 6;
}

message EnvEntry {
  string name  = 1;
  string value = 2;
}

// Readyz describes how to check that a container is ready to serve.
// Only HTTP is supported today.
message Readyz {
  HTTPGetAction http_get = 1;
}

// HTTPGetAction performs an HTTP GET against the container.
message HTTPGetAction {
  // Path to access on the HTTP server. Empty means "/readyz".
  string path = 1;
  // TCP port to connect to (1..65535).
  int32  port = 2;
}

message RunResponse {
}

message LocalCheckpointConfiguration {
  // A sub-directory on the local filesystem below which the checkpoint data will be
  // stored.  The structure of the checkpoint should generally be treated as opaque.
  string snapshot_prefix = 1;
}

message ExternalCheckpointConfiguration {
  // An object storage URI prefix below which the checkpoint data will be
  // stored.
  //
  // The structure of the checkpoint should generally be treated as opaque. For
  // gVisor, the checkpoint consists of a checkpoint.img file that contains the
  // memory, sentry state, and filesystem deltas.  ateom will write additional
  // files to store the WorkloadSpec, which must be reassembled before gVisor
  // can restore a checkpoint.
  //
  // For example: "gs://bucket/actors/1234/snapshots/5678/"
  string snapshot_uri_prefix = 1;
}

enum CheckpointType {
  // Should never happen
  CHECKPOINT_TYPE_UNSPECIFIED = 0;
  // Save snapshot only in local filesystem
  CHECKPOINT_TYPE_LOCAL  = 1;
  // Save snapshot to object storage
  CHECKPOINT_TYPE_EXTERNAL = 2;
}

enum SnapshotScope {
  // Not valid option; should never happen.
  SNAPSHOT_SCOPE_UNSPECIFIED = 0;
  // Capture process memory plus the full filesystem delta on top of the OCI
  // image (including any attached DurableDir volumes).
  SNAPSHOT_SCOPE_FULL = 1;
  // Capture only the contents of attached volumes that support snapshots
  // (currently DurableDir-typed volumes). Memory and the rest of rootfs are
  // excluded.
  SNAPSHOT_SCOPE_DATA = 2;
}

message CheckpointRequest {
  string target_ateom_uid = 1;

  string atespace = 2;
  string actor_id = 3;

  string actor_template_namespace = 4;
  string actor_template_name      = 5;

  // Sandbox binary config is not sent on checkpoint: atelet uses the version the
  // actor is currently running (recorded with the actor's on-node state at
  // Run/Restore) and records it into the snapshot manifest.
  WorkloadSpec spec = 6;

  CheckpointType type = 7;

  // The checkpoint configuration, depending on the type.
  oneof config {
    LocalCheckpointConfiguration local_config    = 8;
    ExternalCheckpointConfiguration external_config = 9;
  }

  // What should be included in the checkpoint.
  SnapshotScope scope = 10;
}

message CheckpointResponse {

}

message RestoreRequest {
  string target_ateom_uid = 1;

  string atespace = 2;
  string actor_id = 3;

  string actor_template_namespace = 4;
  string actor_template_name      = 5;

  // Sandbox binary config is not sent on restore: the snapshot is
  // self-describing. atelet reads the snapshot manifest to recover the pinned
  // sandbox version that created it.
  WorkloadSpec spec = 6;

  CheckpointType type = 7;

  // The checkpoint configuration, depending on the type.
  oneof config {
    LocalCheckpointConfiguration local_config    = 8;
    ExternalCheckpointConfiguration external_config = 9;
  }

  // What content to restore from the checkpoint.
  SnapshotScope scope = 10;
}

message RestoreResponse {

}
